<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Legacy AR - WebAR Franela Ozzy</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Botón de Grabación */
        #recording-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; padding: 15px 25px; border-radius: 50px;
            background-color: #ff0000; color: white; font-family: Arial, sans-serif;
            font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #recording-btn.recording { background-color: #222; animation: pulse 1s infinite; }

        /* Botón de Flash */
        #flash-btn {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            z-index: 1000; padding: 12px 20px; border-radius: 50px;
            background-color: #ffd700; color: black; font-family: Arial, sans-serif;
            font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        #recording-canvas { display: none; }
    </style>
</head>

<body>
    <button id="flash-btn">Encender Flash ⚡</button>
    <button id="recording-btn">Iniciar Grabación</button>
    <canvas id="recording-canvas"></canvas>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             renderer="preserveDrawingBuffer: true; antialias: true; colorManagement: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="Video_WebAR.mp4" preload="auto" loop="true" 
                   crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity geometry="primitive: plane; width: 1; height: 1.339"
                      material="shader: video-alpha-sbs-shader; src: #vid; transparent: true">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // SHADER DEFINITIVO PARA VIDEO 1792x4800 (SBS Vertical)
        AFRAME.registerShader('video-alpha-sbs-shader', {
            schema: { src: {type: 'map', is: 'uniform'} },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform sampler2D src;
                void main() {
                    vec2 uvColor = vec2(vUv.x, vUv.y * 0.5 + 0.5); 
                    vec2 uvAlpha = vec2(vUv.x, vUv.y * 0.5); 
                    vec4 texColor = texture2D(src, uvColor);
                    vec4 texAlpha = texture2D(src, uvAlpha);
                    gl_FragColor = vec4(texColor.rgb, texAlpha.r);
                }
            `
        });

        const btn = document.getElementById('recording-btn');
        const flashBtn = document.getElementById('flash-btn');
        const recordingCanvas = document.getElementById('recording-canvas');
        const ctx = recordingCanvas.getContext('2d', {alpha: false});
        const videoAnim = document.querySelector('#vid');
        
        let mediaRecorder, chunks = [], isRecording = false;
        let audioCtx, mixer, videoSource, micSource;
        let videoTrack = null;

        // --- LÓGICA DEL FLASH ---
        flashBtn.addEventListener('click', async () => {
            try {
                // MindAR crea un video para la cámara, lo buscamos:
                const cameraVideo = document.querySelector('video:not([id])') || document.querySelector('video');
                if (!cameraVideo || !cameraVideo.srcObject) {
                    alert("Cámara no lista. Espera a que cargue la experiencia.");
                    return;
                }

                const track = cameraVideo.srcObject.getVideoTracks()[0];
                const capabilities = track.getCapabilities();

                if (!capabilities.torch) {
                    alert("Tu dispositivo no soporta el control del flash desde el navegador.");
                    return;
                }

                // Obtener estado actual (si existe) o asumir apagado
                const currentConstraints = track.getConstraints();
                const isFlashOn = currentConstraints.advanced && currentConstraints.advanced[0].torch;

                await track.applyConstraints({
                    advanced: [{ torch: !isFlashOn }]
                });

                flashBtn.textContent = !isFlashOn ? "Apagar Flash 🌑" : "Encender Flash ⚡";
                flashBtn.style.backgroundColor = !isFlashOn ? "#555" : "#ffd700";
                flashBtn.style.color = !isFlashOn ? "white" : "black";

            } catch (err) {
                console.error("Error con el flash: ", err);
                alert("Error al activar flash. Asegúrate de estar usando HTTPS.");
            }
        });

        // --- LÓGICA DE TARGETS ---
        const targetEl = document.querySelector('[mindar-image-target]');
        targetEl.addEventListener("targetFound", () => videoAnim.play());
        targetEl.addEventListener("targetLost", () => videoAnim.pause());

        // --- LÓGICA DE GRABACIÓN ---
        btn.addEventListener('click', async () => {
            if (!isRecording) {
                await initAudio();
                startCapture();
            } else {
                stopCapture();
            }
        });

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mixer = audioCtx.createMediaStreamDestination();
                videoSource = audioCtx.createMediaElementSource(videoAnim);
                videoSource.connect(mixer);
                videoSource.connect(audioCtx.destination);
                try {
                    const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    micSource = audioCtx.createMediaStreamSource(micStream);
                    micSource.connect(mixer);
                } catch(e) { console.warn("Micrófono no detectado"); }
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        function startCapture() {
            const cameraVideo = document.querySelector('video:not([id])') || document.querySelector('video');
            const aframeCanvas = document.querySelector('canvas.a-canvas');

            recordingCanvas.width = cameraVideo.videoWidth || 1280;
            recordingCanvas.height = cameraVideo.videoHeight || 720;

            const videoStream = recordingCanvas.captureStream(30);
            const combinedStream = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...mixer.stream.getAudioTracks()
            ]);

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp9' });
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = saveVideo;

            isRecording = true;
            mediaRecorder.start();

            function renderFrame() {
                if (!isRecording) return;
                ctx.drawImage(cameraVideo, 0, 0, recordingCanvas.width, recordingCanvas.height);
                ctx.drawImage(aframeCanvas, 0, 0, recordingCanvas.width, recordingCanvas.height);
                requestAnimationFrame(renderFrame);
            }
            renderFrame();
            
            btn.textContent = "Detener";
            btn.classList.add('recording');
        }

        function stopCapture() {
            isRecording = false;
            mediaRecorder.stop();
            btn.textContent = "Grabar de Nuevo";
            btn.classList.remove('recording');
        }

        function saveVideo() {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `LegacyAR_Ozzy_${Date.now()}.webm`;
            link.click();
            chunks = [];
        }
    </script>
</body>
</html>
