<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Legacy AR - WebAR Franela Ozzy</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Pantalla de inicio para forzar la interacción del usuario y desbloquear el video */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 20px 40px; border-radius: 50px; border: none;
            background: #ff0000; color: white; font-size: 18px;
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer;
        }

        /* Botón de Grabación (Círculo Rojo) */
        #recording-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 70px; height: 70px; border-radius: 50%;
            background-color: #ff0000; border: 4px solid white; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: none;
        }
        #recording-btn.recording { background-color: #222; animation: pulse 1s infinite; border-color: #ff0000; }

        /* Botón de Flash (Icono de Rayo) */
        #flash-btn {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 50px; height: 50px; border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6); border: 2px solid white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; display: none;
        }
        #flash-btn svg { width: 25px; height: 25px; fill: white; }
        
        /* Estado activo del flash */
        #flash-btn.active { background-color: #ffd700; border-color: #ffd700; box-shadow: 0 0 15px #ffd700; }
        #flash-btn.active svg { fill: black; }

        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(0.9); } }
        #recording-canvas { display: none; }
    </style>
</head>

<body>
    <!-- Pantalla de inicio obligatoria para el navegador móvil -->
    <div id="start-overlay">
        <button id="start-btn">INICIAR EXPERIENCIA AR</button>
    </div>

    <!-- Botón de Flash con Icono SVG de Rayo -->
    <div id="flash-btn">
        <svg viewBox="0 0 24 24">
            <path d="M7,2V13H10V22L17,10H13L17,2H7Z" />
        </svg>
    </div>

    <button id="recording-btn"></button>
    <canvas id="recording-canvas"></canvas>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
             renderer="preserveDrawingBuffer: true; antialias: true; colorManagement: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="Video_WebAR.mp4" preload="auto" loop="true" 
                   crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity geometry="primitive: plane; width: 1; height: 1.339"
                      material="shader: video-alpha-sbs-shader; src: #vid; transparent: true">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        AFRAME.registerShader('video-alpha-sbs-shader', {
            schema: { src: {type: 'map', is: 'uniform'} },
            vertexShader: `
                varying vec2 vUv;
                void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform sampler2D src;
                void main() {
                    vec2 uvColor = vec2(vUv.x, vUv.y * 0.5 + 0.5); 
                    vec2 uvAlpha = vec2(vUv.x, vUv.y * 0.5); 
                    vec4 texColor = texture2D(src, uvColor);
                    vec4 texAlpha = texture2D(src, uvAlpha);
                    gl_FragColor = vec4(texColor.rgb, texAlpha.r);
                }
            `
        });
